[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
script = "script_disabled"
auto_detect_solc = true
optimizer = true
optimizer_runs = 200
via_ir = true
remappings = [
    "forge-std/=lib/forge-std/src/",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/contracts-v5/=lib/openzeppelin-contracts-v5/contracts/",
    "@erc3643org/erc-3643/=lib/erc-3643/",
    "@onchain-id/solidity/=lib/solidity/"
]
# no ignored_paths in foundry; remappings above pin forge-std to top-level copy
fs_permissions = [
    { access = "read", path = "./config" }
]

